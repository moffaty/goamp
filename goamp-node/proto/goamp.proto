syntax = "proto3";

package goamp;
option go_package = "github.com/goamp/sdk/proto";

// ─── Catalog ─────────────────────────────────────────────────────────────────

message Track {
  string id              = 1;
  string artist          = 2;
  string title           = 3;
  string musicbrainz_id  = 4;
  uint32 duration_secs   = 5;
  string genre           = 6;
  uint32 peer_count      = 7;
}

message SearchRequest {
  string          query  = 1;
  repeated string genres = 2;
  uint32          limit  = 3;
}

message SearchResponse {
  repeated Track tracks = 1;
}

message AnnounceRequest {
  string track_id  = 1;
  uint64 timestamp = 2;
}

message SyncRequest {
  int64 since_unix_ts = 1;
}

message SyncBatch {
  repeated Track tracks = 1;
  bool           has_more = 2;
}

// ─── Profiles ────────────────────────────────────────────────────────────────

message MoodCentroid {
  repeated float vec         = 1;  // ~30-dim normalized tag vector
  int32          track_count = 2;  // number of tracks that contributed
  int64          updated_at  = 3;
}

message TasteProfile {
  uint32               version        = 1;
  repeated string      liked_hashes   = 2;
  repeated ListenPair  listen_pairs   = 3;
  map<string, float>   genre_weights  = 4;
  uint32               total_listens  = 5;
  repeated ListeningProof proofs      = 6;
  map<string, MoodCentroid> mood_centroids = 7;
}

message ListenPair {
  string track_hash_a = 1;
  string track_hash_b = 2;
}

message ListeningProof {
  string track_hash    = 1;
  int64  started_at    = 2;
  int32  duration_secs = 3;
  int32  listened_secs = 4;
}

// ─── Events ──────────────────────────────────────────────────────────────────

message Event {
  string type    = 1;
  bytes  payload = 2; // JSON
}

message EventAck {
  bool ok = 1;
}

// ─── Plugin gRPC service ─────────────────────────────────────────────────────

message RegisterRequest {
  string node_version = 1;
}

message PluginManifest {
  string          id               = 1;
  string          version          = 2;
  repeated string search_providers = 3;
  repeated string protocols        = 4;
  repeated string http_routes      = 5;
}

message StreamURLRequest {
  string provider_id = 1;
  string track_id    = 2;
}

message StreamURLResponse {
  string url        = 1;
  int64  expires_at = 2;
}

service GoampPlugin {
  rpc Register   (RegisterRequest)  returns (PluginManifest);
  rpc Search     (SearchRequest)    returns (SearchResponse);
  rpc StreamURL  (StreamURLRequest) returns (StreamURLResponse);
  rpc HandleEvent(Event)            returns (EventAck);
}
