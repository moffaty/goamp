pre-commit:
  parallel: true
  commands:
    ts-check:
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
    rust-fmt:
      glob: "*.rs"
      run: export PATH="$HOME/.cargo/bin:$PATH" && cargo fmt --manifest-path src-tauri/Cargo.toml --check

pre-push:
  parallel: true
  commands:
    ts-check:
      run: npx tsc --noEmit
    rust-clippy:
      run: export PATH="$HOME/.cargo/bin:$PATH" && cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
    rust-fmt:
      run: export PATH="$HOME/.cargo/bin:$PATH" && cargo fmt --manifest-path src-tauri/Cargo.toml --check
    rust-test:
      run: export PATH="$HOME/.cargo/bin:$PATH" && cargo test --manifest-path src-tauri/Cargo.toml
